[build]
publish = "public"
command = "make production-build"

[build.environment]
NODE_VERSION = "20.17.0"
HUGO_VERSION = "0.144.2"

[context.production]
command = "curl -sSfL https://go.dev/dl/go1.26.4.linux-amd64.tar.gz | sudo tar -xz -C /usr/local && export PATH=/usr/local/go/bin:$PATH && make production-build"

[context.production.environment]
HUGO_ENV = "production"

[context.deploy-preview]
command = "make preview-build"

[context.branch-deploy]
command = "make preview-build"

[build.processing.deploy_notifications]
schedule = "0 5 * * *"


[[redirects]]
from = "http://k8s.dev/*"
to =  "https://www.kubernetes.dev/:splat"
status = 301
force = true

[[redirects]]
from = "https://k8s.dev/*"
to =  "https://www.kubernetes.dev/:splat"
status = 301
force = true

[[redirects]]
from = "http://kubernetes.dev/*"
to =  "https://www.kubernetes.dev/:splat"
status = 301
force = true

[[redirects]]
from = "https://kubernetes.dev/*"
to =  "https://www.kubernetes.dev/:splat"
status = 301
force = true
