baseURL: 'https://www.kubernetes.dev/'
title: &title Kubernetes Contributors # Create a reference to use later
theme:
  - docsy
themesDir: node_modules
enableRobotsTXT: true

# Language settings
contentDir: content/en

enableMissingTranslationPlaceholders: true
disableKinds:
  - taxonomy

# Configure how URLs look like per section.
permalinks:
  blog: '/:section/:year/:month/:day/:slug/'

# Image processing configuration.
imaging:
  resampleFilter: CatmullRom

services:
  googleAnalytics:
    # Fake ID in support of [params.ui.feedback]. The real GA ID is set in the Netlify config.
    id: UA-00000000-0

# Hugo internal caching
caches:
  assets:
    dir: ':cacheDir/_gen'
    maxAge: -1
  getcsv:
    dir: ':cacheDir/:project'
    maxAge: 60s
  getjson:
    dir: ':cacheDir/:project'
    maxAge: 60s
  getresource:
    dir: ':cacheDir/:project'
    maxAge: 2h
  images:
    dir: ':cacheDir/_images'
    maxAge: -1
  modules:
    dir: ':cacheDir/modules'
    maxAge: -1

module:
  hugoVersion:
    extended: true
    min: "0.133.0"
  # Module imports pin upstream content versions via go.sum.
  # Content is mounted directly from modules (no adapt-content.sh copy step).
  # Each import uses mounts to map source paths to target site paths,
  # with README.md -> _index.md renaming done via individual file mounts.
  imports:
    - path: k8s.io/community
      mounts:
        # --- Directory mounts: content files (excluding README.md) ---
        - source: contributors/guide
          target: content/en/docs/guide
          excludeFiles: "**/README.md"
        - source: communication
          target: content/en/docs/comms
          excludeFiles: "**/README.md"
        - source: mentoring
          target: content/en/community
          excludeFiles: "**/README.md"
        - source: committee-code-of-conduct
          target: content/en/community/committee-code-of-conduct
          excludeFiles: "**/README.md"
        - source: github-management
          target: content/en/resources/github-management
          excludeFiles: "**/README.md"

        # --- Individual file mounts (sig-list, values, policies, etc.) ---
        - source: sig-list.md
          target: content/en/sig-list.md
        - source: values.md
          target: content/en/community/values.md
        - source: code-of-conduct.md
          target: content/en/includes/code-of-conduct.md
        # CLA.md provided locally via content/en/CLA.md
        - source: community-membership.md
          target: content/en/community/community-membership.md

        # --- README.md -> _index.md file mounts (contributors/guide) ---
        - source: contributors/guide/README.md
          target: content/en/docs/guide/_index.md
        - source: contributors/guide/contributor-cheatsheet/README.md
          target: content/en/docs/guide/contributor-cheatsheet/_index.md

        # --- README.md -> _index.md file mounts (communication) ---
        - source: communication/contributor-comms/README.md
          target: content/en/docs/comms/contributor-comms/_index.md
        - source: communication/contributor-comms/blogging-resources/README.md
          target: content/en/docs/comms/contributor-comms/blogging-resources/_index.md
        - source: communication/slack-config/README.md
          target: content/en/docs/comms/slack-config/_index.md
        - source: communication/youtube/README.md
          target: content/en/docs/comms/youtube/_index.md

        # --- README.md -> _index.md file mounts (mentoring -> community) ---
        - source: mentoring/new-contributor-orientation/README.md
          target: content/en/community/new-contributor-orientation/_index.md
        - source: mentoring/processes/README.md
          target: content/en/community/processes/_index.md
        - source: mentoring/programs/README.md
          target: content/en/community/programs/_index.md
        - source: mentoring/programs/contributor-workshop/README.md
          target: content/en/community/programs/contributor-workshop/_index.md
        - source: mentoring/programs/contributor-workshop/guides/README.md
          target: content/en/community/programs/contributor-workshop/guides/_index.md
        - source: mentoring/programs/contributor-workshop/live-workshop/README.md
          target: content/en/community/programs/contributor-workshop/live-workshop/_index.md

        # --- README.md -> _index.md (committee-code-of-conduct) ---
        - source: committee-code-of-conduct/README.md
          target: content/en/community/committee-code-of-conduct/_index.md

        # --- README.md -> _index.md (github-management) ---
        - source: github-management/README.md
          target: content/en/resources/github-management/_index.md

    - path: github.com/cncf/foundation
      mounts:
        - source: code-of-conduct.md
          target: content/en/includes/cncf-code-of-conduct.md

    - path: github.com/kubernetes/sig-release
      mounts:
        - source: releases/release-1.37/README.md
          target: content/en/resources/release/index.md

  # Use npm-installed copies of Docsy Hugo Module deps so Hugo skips `go get`
  # at build time. The `go get` walks go.mod transitive imports and fails
  # wherever the dependency is absent (e.g. Netlify).
  replacements: "github.com/twbs/bootstrap -> bootstrap, github.com/FortAwesome/Font-Awesome -> @fortawesome/fontawesome-free"

# Language configuration
languages:
  en:
    title: *title # Use the YAML reference instead of repeating
    languageName: English

markup:
  goldmark:
    renderer:
      unsafe: true
  # Default highlight is tango for Docsy but the website uses emacs (for now)
  highlight:
    style: emacs
    noClasses: false

frontmatter:
  date:
    - date
    - ':filename'
    - publishDate
    - lastmod

# Everything below this are Site Params
params:
  # This is used instead of the built-in top level `copyright` to utilize
  # Docsy's partial which adds the copyright year automatically
  copyright: The Kubernetes Authors
  gcs_engine_id: 8ad0f1b8442fece81

  # User interface configuration
  ui:
    # Enable to show the sidebar menu in its compact state.
    sidebar_menu_compact: true
    # Set to true to disable the About link in the site footer
    footer_about_disable: false

    # Adds an H2 section titled "Feedback" to the bottom of each doc. The responses are sent to Google Analytics as events.
    # This feature depends on [services.googleAnalytics] and will be disabled if "services.googleAnalytics.id" is not set.
    # If you want this feature, but occasionally need to remove the "Feedback" section from a single page,
    # add "hide_feedback: true" to the page's front matter.
    feedback:
      enable: true
    # The responses that the user sees after clicking "yes" (the page was helpful) or "no" (the page was not helpful).
    # yes = 'Glad to hear it! Please <a href="https://github.com/USERNAME/REPOSITORY/issues/new">tell us how we can improve</a>.'
    # no = 'Sorry to hear that. Please <a href="https://github.com/USERNAME/REPOSITORY/issues/new">tell us how we can improve</a>.'

  links:
    # End user relevant links. These will show up on left side of footer and in the community page if you have one.
    user:
      - name: Kubernetes Dev Mailing List
        url: 'https://groups.google.com/a/kubernetes.io/group/dev'
        icon: fa fa-envelope
        desc: Discussion and help from your fellow users
      - name: X
        url: 'https://x.com/K8sContributors'
        icon: fa-brands fa-x-twitter
        desc: Follow us on X to get the latest news!
      - name: LinkedIn
        url: 'https://www.linkedin.com/company/kubernetes'
        icon: fab fa-linkedin
        desc: "Kubernetes on LinkedIn"
      - name: YouTube
        url: 'https://youtube.com/kubernetescommunity'
        icon: fab fa-youtube
        desc: Kubernetes Community on YouTube
      - name: Mastodon
        url: 'https://hachyderm.io/@K8sContributors'
        icon: fab fa-mastodon
        desc: Follow us on Mastodon
      - name: BlueSky
        url: 'https://bsky.app/profile/kubernetes.dev'
        icon: fab fa-bluesky
        desc: Follow us on BlueSky
    # Developer relevant links. These will show up on right side of footer and in the community page if you have one.
    developer:
      - name: GitHub
        url: 'https://github.com/kubernetes/contributor-site'
        icon: fab fa-github
        desc: Source code for the Kubernetes Contributor Site!
      - name: Slack
        url: 'https://slack.k8s.io'
        icon: fab fa-slack
        desc: Chat with other project developers
